<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test with Duck</title>
    <style>body{margin:0;background:#000;color:#fff;font-family:sans-serif;}#info{position:absolute;top:10px;left:10px;font-size:14px;}</style>
</head>
<body>
<div id="info">Loading Duck...</div>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1, 3);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
hemi.position.set(0,20,0);
scene.add(hemi);
const dir = new THREE.DirectionalLight(0xffffff, 1.5);
dir.position.set(-3,5,-3);
dir.castShadow = true;
scene.add(dir);

const ground = new THREE.Mesh(new THREE.PlaneGeometry(20,20), new THREE.MeshStandardMaterial({color:0x808080, roughness:0.9, metalness:0}));
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

const loader = new GLTFLoader();
loader.load(
    'https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/models/gltf/Duck/glTF-Binary/Duck.glb',
    (gltf) => {
        console.log('Duck loaded');
        const model = gltf.scene;
        model.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
        scene.add(model);
        document.getElementById('info').textContent = 'Duck loaded. Drag to orbit.';
    },
    (xhr) => {
        document.getElementById('info').textContent = 'Loading Duck... ' + Math.round((xhr.loaded / xhr.total) * 100) + '%';
    },
    (err) => {
        console.error('Duck load error', err);
        document.getElementById('info').textContent = 'Error loading Duck: ' + err;
    }
);

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
