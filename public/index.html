<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLB Viewer</title>
    <style>
        body { margin:0; overflow:hidden; background:#000; color:#fff; font-family:sans-serif; }
        #info { position:absolute; top:10px; left:10px; font-size:14px; pointer-events:none; }
        #loader { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:16px; pointer-events:none; }
    </style>
</head>
<body>
<div id="loader">Loading model...</div>
<div id="info"></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/loaders/GLTFLoader.js';

let scene, camera, renderer, controls, mixer;
const clock = new THREE.Clock();

const loader = new GLTFLoader();
loader.load(
    // resource URL
    'model.glb',
    // onLoad callback
    function (gltf) {
        const model = gltf.scene;
        // traverse and set cast/receive shadows
        model.traverse(function (child) {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(model);

        // animations
        if (gltf.animations && gltf.animations.length) {
            mixer = new THREE.AnimationMixer(model);
            gltf.animations.forEach(function (clip) {
                mixer.clipAction(clip).play();
            });
        }

        // hide loader
        document.getElementById('loader').style.display = 'none';
        document.getElementById('info').textContent = 'Model loaded. Drag to orbit, scroll to zoom.';
    },
    // onProgress callback
    function (xhr) {
        if (xhr.lengthComputable) {
            const percentComplete = xhr.loaded / xhr.total * 100;
            document.getElementById('loader').textContent = 'Loading model... ' + Math.round(percentComplete) + '%';
        }
    },
    // onError callback
    function (error) {
        console.error('An error happened', error);
        document.getElementById('loader').textContent = 'Error loading model';
        document.getElementById('info').textContent = error.message;
    }
);

 // Set up the scene, camera, renderer
scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1, 3);

renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x000000);
document.body.appendChild(renderer.domElement);

// lights
const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
hemi.position.set(0,20,0);
scene.add(hemi);
const dir = new THREE.DirectionalLight(0xffffff, 1.5);
dir.position.set(-3,5,-3);
dir.castShadow = true;
scene.add(dir);

// ground
const ground = new THREE.Mesh(new THREE.PlaneGeometry(20,20), new THREE.MeshStandardMaterial({color:0x808080, roughness:0.9, metalness:0}));
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// camera controls
controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// resize listener
window.addEventListener('resize', function () {
    const width = window.innerWidth;
    const height = window.innerHeight;
    renderer.setSize(width, height);
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
});

function animate() {
    requestAnimationFrame(animate);
    if (mixer) mixer.update(clock.getDelta());
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
