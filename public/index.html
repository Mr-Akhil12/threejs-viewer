<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js GLB Viewer - Realistic</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #info {
            position: absolute;
            top: 10px; left: 10px;
            color: #fff; font-size: 14px;
            text-shadow: 0 0 1px #000;
            pointer-events: none;
        }
        #loader {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 16px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loader">Loading model...</div>
    <div id="info"></div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js';
        { 
          const originalWarn = console.warn;
          console.warn = (...args) => {
            if (args.some(arg => String(arg).includes('LOWER_LEFT') || String(arg).includes('Just flip the image'))) {
              return;
            }
            originalWarn.apply(console, args);
          };
        }
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/loaders/GLTFLoader.js';
        import { RGBELoader } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/loaders/RGBELoader.js';
        import { PMREMGenerator } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/pmrem/PMREMGenerator.js';

        let scene, camera, renderer, controls, mixer;
        const clock = new THREE.Clock();

        async function init() {
            // Scene
            scene = new THREE.Scene();

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 3);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            // Try to load HDRI environment, fallback to solid color
            let envMapPMREM = null;
            try {
                const pmremGenerator = new PMREMGenerator(renderer);
                pmremGenerator.compileEquirectangularShader();

                const rgbeLoader = new RGBELoader();
                const hdrUrl = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/textures/equirectangular/venice_sunset_1k.hdr';
                const envMap = await rgbeLoader.setPath('').loadAsync(hdrUrl);
                envMapPMREM = pmremGenerator.fromEquirectangular(envMap).texture;
                envMap.dispose();

                scene.environment = envMapPMREM;
                scene.background = envMapPMREM; // Use HDRI as background
            } catch (e) {
                console.warn('Failed to load HDRI, falling back to solid background:', e);
                scene.background = new THREE.Color(0x000000);
                scene.environment = null;
            }

            // Ground
            const groundGeometry = new THREE.PlaneGeometry(20, 20);
            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x808080,
                roughness: 0.9,
                metalness: 0.0
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = 0; // adjust if model's base is not at zero
            ground.receiveShadow = true;
            scene.add(ground);

            // Optional: add a subtle directional light to match HDRI sun (if needed)
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 20;
            dirLight.shadow.camera.left = -10;
            dirLight.shadow.camera.right = 10;
            dirLight.shadow.camera.top = 10;
            dirLight.shadow.camera.bottom = -10;
            scene.add(dirLight);

            // Load model
            const loader = new GLTFLoader();
            const modelUrl = 'model.glb';
            const gltf = await loader.loadAsync(modelUrl);
            const model = gltf.scene;

            // Traverse and enhance materials
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    // Upgrade material if possible
                    if (child.material.isMeshStandardMaterial) {
                        // Convert to MeshPhysicalMaterial for better realism
                        const physical = new THREE.MeshPhysicalMaterial({
                            color: child.material.color,
                            map: child.material.map,
                            normalMap: child.material.normalMap,
                            roughness: child.material.roughness,
                            metalness: child.material.metalness,
                            clearcoat: child.material.clearcoat !== undefined ? child.material.clearcoat : 0.1,
                            clearcoatRoughness: child.material.clearcoatRoughness !== undefined ? child.material.clearcoatRoughness : 0.25,
                            reflectivity: child.material.reflectivity,
                        });
                        child.material.dispose();
                        child.material = physical;
                    }
                    // Optionally add Fresnel via clearcoat (already above)
                }
            });

            scene.add(model);

            // Animation (if any)
            if (gltf.animations && gltf.animations.length) {
                mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach((clip) => {
                    mixer.clipAction(clip).play();
                });
            }

            // Fit camera to model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const offset = new THREE.Vector3(0, maxDim * 0.5, maxDim * 0.75);
            camera.position.copy(center).add(offset);
            camera.lookAt(center);
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = maxDim * 0.5;
            controls.maxDistance = maxDim * 3;
            controls.target.copy(center);
            controls.update();

            // Hide loader
            document.getElementById('loader').style.display = 'none';
            document.getElementById('info').textContent = 'Model loaded. Drag to orbit, scroll to zoom.';
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            controls.update();
            renderer.render(scene, camera);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        (async () => {
            try {
                await init();
                animate();
            } catch (err) {
                console.error('Init failed:', err);
                document.getElementById('loader').textContent = 'Error loading model';
                document.getElementById('info').textContent = 'See console for details';
            }
        })();
    </script>
</body>
</html>
