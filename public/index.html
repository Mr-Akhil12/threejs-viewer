<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <style>body{margin:0;background:#000;color:#fff;font-family:sans-serif;}#info{position:absolute;top:10px;left:10px;font-size:14px;}</style>
</head>
<body>
<div id="info">Test</div>
<script type="module">
console.log('Module started');
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js';
console.log('Three imported', THREE);
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/loaders/GLTFLoader.js';
console.log('GLTFLoader imported');
const loader = new GLTFLoader();
loader.load('model.glb', (gltf) => {
    console.log('GLB loaded');
    document.getElementById('info').textContent = 'Loaded';
}, undefined, (err) => {
    console.error('Load error', err);
    document.getElementById('info').textContent = 'Error: ' + err;
});
</script>
</body>
</html>
