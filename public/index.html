<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLB Viewer - r170.0</title>
    <style>body{margin:0;overflow:hidden;background:#000;color:#fff;font-family:sans-serif;}#info{position:absolute;top:10px;left:10px;font-size:14px;pointer-events:none;}#loader{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:16px;pointer-events:none;}</style>
</head>
<body>
<div id="loader">Loading model...</div>
<div id="info"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

let scene, camera, renderer, controls, mixer;
const clock = new THREE.Clock();

async function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1, 3);

    renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setClearColor(0x000000);
    document.body.appendChild(renderer.domElement);

    // light
    const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
    hemi.position.set(0,20,0);
    scene.add(hemi);
    const dir = new THREE.DirectionalLight(0xffffff, 1.5);
    dir.position.set(-3,5,-3);
    dir.castShadow = true;
    scene.add(dir);

    // ground
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(20,20), new THREE.MeshStandardMaterial({color:0x808080, roughness:0.9, metalness:0}));
    ground.rotation.x = -Math.PI/2;
    ground.receiveShadow = true;
    scene.add(ground);

    // load model
    const loader = new GLTFLoader();
    const gltf = await loader.loadAsync('model.glb');
    const model = gltf.scene;
    model.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
    scene.add(model);

    // animations
    if (gltf.animations.length) {
        mixer = new THREE.AnimationMixer(model);
        gltf.animations.forEach(a => mixer.clipAction(a).play());
    }

    // fit camera
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const offset = new THREE.Vector3(0, maxDim*0.5, maxDim*0.75);
    camera.position.copy(center).add(offset);
    camera.lookAt(center);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = maxDim*0.5;
    controls.maxDistance = maxDim*3;
    controls.target.copy(center);
    controls.update();

    document.getElementById('loader').style.display = 'none';
    document.getElementById('info').textContent = 'Model loaded. Drag to orbit, scroll to zoom.';
}

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    if (mixer) mixer.update(delta);
    controls.update();
    renderer.render(scene, camera);
}

// start
(async () => {
    try { await init(); animate(); }
    catch(e) { console.error(e); document.getElementById('loader').textContent = 'Error loading model'; document.getElementById('info').textContent = e.message; }
})();
</script>
</body>
</html>
